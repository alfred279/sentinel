# Builds Sentinel's Docker images and publishes them to GitHub Container
# Registry (GHCR) whenever you push a version tag. THIS is what turns your
# source code into downloadable, installable artifacts.
#
# To cut a release:
#   git tag v0.1.0 && git push origin v0.1.0
# The installer then pulls ghcr.io/<you>/sentinel-backend etc. — no source build.

name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # add 'frontend' here once the frontend Dockerfile exists (Phase 5)
        component: [backend]
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Buildx (multi-arch for Raspberry Pi + x86)
        uses: docker/setup-buildx-action@v3

      - name: Set up QEMU (enables arm64 builds)
        uses: docker/setup-qemu-action@v3

      - name: Build and push ${{ matrix.component }}
        uses: docker/build-push-action@v6
        with:
          context: ./${{ matrix.component }}
          # arm64 = Raspberry Pi / most mini-PCs; amd64 = Intel NUC / N100
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/sentinel-${{ matrix.component }}:latest
            ghcr.io/${{ github.repository_owner }}/sentinel-${{ matrix.component }}:${{ github.ref_name }}
